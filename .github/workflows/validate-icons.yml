name: Validate Icons

on:
  pull_request:
    paths:
      - bumblevueicons.css
      - raw-svg/**
      - scripts/validate-icons-css.mjs
      - package.json
      - .github/workflows/validate-icons.yml
  push:
    branches:
      - main
      - master
      - beta
    paths:
      - bumblevueicons.css
      - raw-svg/**
      - scripts/validate-icons-css.mjs
      - package.json
      - .github/workflows/validate-icons.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-icons:
    name: Validate raw SVG icons are in CSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate icons
        run: npm run validate:icons-css
